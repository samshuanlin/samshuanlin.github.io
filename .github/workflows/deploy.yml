name: Build and Deploy Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Install PNPM
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 2. Setup Node.js (Updated to Node 24 to fix the deprecation error)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Cache is removed here so it won't crash looking for a lockfile

      # 3. Install your project's dependencies
      - name: Install dependencies
        run: pnpm install

      # 4. Compile the Figma code into static HTML/CSS/JS
      - name: Build project
        run: pnpm build

      # NEW DIAGNOSTIC STEP: Check where the files are
      - name: List files to find the build folder
        run: |
          echo "=== Root Folder ==="
          ls -la
          echo "=== Is there a dist folder? ==="
          ls -la dist || echo "No dist folder here"

      - name: Setup Pages
        uses: actions/configure-pages@v5
